<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>coldrain photobooth</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
min-height: 100vh;
background:
radial-gradient(ellipse at 18% 28%, rgba(255,255,255,0.92) 0%, transparent 38%),
radial-gradient(ellipse at 72% 18%, rgba(255,255,255,0.88) 0%, transparent 32%),
radial-gradient(ellipse at 48% 58%, rgba(255,255,255,0.65) 0%, transparent 42%),
radial-gradient(ellipse at 8%  72%, rgba(255,255,255,0.72) 0%, transparent 28%),
radial-gradient(ellipse at 88% 62%, rgba(255,255,255,0.78) 0%, transparent 32%),
linear-gradient(180deg, #87ceeb 0%, #b8e0f7 40%, #d4eeff 70%, #e8f5ff 100%);
font-family: ‘Space Mono’, monospace;
display: flex; flex-direction: column; align-items: center;
overflow-x: hidden; position: relative;
}
body::after {
content: ‘’;
position: fixed; inset: 0; pointer-events: none; z-index: 0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’ opacity=‘0.04’/%3E%3C/svg%3E”);
opacity: 0.5;
}

.page {
position: relative; z-index: 1;
width: 100%; max-width: 440px;
display: flex; flex-direction: column; align-items: center;
padding-bottom: 60px;
}

/* LOGO */
.logo-section {
padding: 32px 20px 20px;
display: flex; flex-direction: column; align-items: center; gap: 8px;
animation: dropIn 0.9s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes dropIn {
from { opacity:0; transform: translateY(-24px) scale(0.95); }
to   { opacity:1; transform: translateY(0) scale(1); }
}
.logo-img { width: 220px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15)); }
.logo-sub {
font-family: ‘VT323’, monospace; font-size: 0.9rem;
letter-spacing: 8px; color: rgba(30,60,100,0.5); text-transform: uppercase;
}

/* MACHINE */
.machine-body {
width: 88%; max-width: 360px;
background: linear-gradient(180deg, #d0d4dc 0%, #bfc3cc 40%, #c8ccd4 100%);
border-radius: 16px 16px 8px 8px;
box-shadow: 0 8px 32px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.3) inset, 0 -2px 0 rgba(0,0,0,0.2) inset;
padding: 16px 16px 0;
display: flex; flex-direction: column; align-items: center; gap: 10px;
animation: slideUp 1s cubic-bezier(0.25,0.46,0.45,0.94) 0.2s both;
}
@keyframes slideUp {
from { opacity:0; transform: translateY(30px); }
to   { opacity:1; transform: translateY(0); }
}

.machine-detail {
width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 4px;
}
.machine-label { font-family: ‘VT323’, monospace; font-size: 0.75rem; letter-spacing: 4px; color: rgba(60,60,80,0.5); }
.machine-dots { display: flex; gap: 5px; }
.mdot { width: 7px; height: 7px; border-radius: 50%; background: rgba(0,0,0,0.15); box-shadow: inset 0 1px 2px rgba(0,0,0,0.3); }
.mdot.green { background: #4caf50; box-shadow: 0 0 4px #4caf50; }

/* VIEWFINDER */
.vf-wrap {
width: 100%; background: #0a0a0a; border-radius: 8px; padding: 8px;
box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);
}
.viewfinder {
width: 100%; aspect-ratio: 1; background: #000;
border-radius: 4px; overflow: hidden; position: relative;
}
.viewfinder video { width: 100%; height: 100%; object-fit: cover; display: block; }
.vf-filter { position: absolute; inset: 0; pointer-events: none; }
.vf-filter.y2k {
background: linear-gradient(135deg, rgba(255,180,220,0.2), rgba(210,170,255,0.18));
mix-blend-mode: screen;
}
.scan-lines {
position: absolute; inset: 0; pointer-events: none;
background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
}
.cd-overlay {
position: absolute; inset: 0;
display: flex; align-items: center; justify-content: center;
background: rgba(0,0,0,0.45); opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.cd-overlay.show { opacity: 1; }
.cd-num {
font-family: ‘VT323’, monospace; font-size: 9rem; color: #fff; line-height: 1;
text-shadow: 0 0 40px rgba(200,150,255,0.8);
animation: cdPop 0.55s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes cdPop {
from { transform: scale(3); opacity: 0; }
to   { transform: scale(1); opacity: 1; }
}
.shot-overlay { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; }

/* FILTER ROW */
.filter-row { display: flex; gap: 6px; width: 100%; }
.fbtn {
flex: 1; padding: 8px 4px;
border: 1px solid rgba(0,0,0,0.15); border-radius: 20px;
background: rgba(255,255,255,0.4); color: rgba(40,40,60,0.5);
font-family: ‘VT323’, monospace; font-size: 1rem; letter-spacing: 1px;
cursor: pointer; backdrop-filter: blur(4px); transition: all 0.2s;
}
.fbtn.on {
background: rgba(255,255,255,0.75); color: #1a1a3a;
border-color: rgba(0,0,0,0.25); box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* BUTTONS */
.ctrl-row { display: flex; gap: 8px; width: 100%; }
.btn {
flex: 1; padding: 11px 6px;
border: none; border-radius: 6px;
font-family: ‘Space Mono’, monospace; font-size: 0.7rem; letter-spacing: 1px;
cursor: pointer; transition: all 0.15s; text-transform: uppercase;
}
.btn:active { transform: scale(0.96); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-ghost {
background: rgba(255,255,255,0.45); border: 1px solid rgba(0,0,0,0.15);
color: rgba(30,30,60,0.7); backdrop-filter: blur(4px);
}
.btn-ghost:not(:disabled):hover { background: rgba(255,255,255,0.65); }
.btn-shoot {
flex: 2; background: linear-gradient(180deg, #2a2a2a 0%, #111 100%);
color: #eee; font-size: 0.8rem; font-weight: 700; letter-spacing: 3px;
box-shadow: 0 3px 12px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
}
.btn-shoot:not(:disabled):hover { background: linear-gradient(180deg, #333 0%, #1a1a1a 100%); }
.btn-save { background: rgba(255,255,255,0.5); border: 1px solid rgba(0,0,0,0.2); color: #1a1a3a; backdrop-filter: blur(4px); }

/* PROGRESS */
.prog-row { display: flex; gap: 10px; align-items: center; }
.pd { width: 32px; height: 4px; border-radius: 2px; background: rgba(0,0,0,0.15); transition: all 0.4s; }
.pd.active { background: rgba(30,30,80,0.6); box-shadow: 0 0 6px rgba(100,100,200,0.4); }
.pd.done { background: rgba(30,30,80,0.35); }

.status {
font-family: ‘VT323’, monospace; font-size: 1rem; letter-spacing: 3px;
color: rgba(30,60,100,0.55); text-align: center; min-height: 1.4em;
}

/* SLOT HOUSING */
.slot-housing {
width: 100%; background: linear-gradient(180deg, #aab0bc 0%, #9a9faa 100%);
border-radius: 0 0 8px 8px; padding: 10px 16px 14px;
display: flex; flex-direction: column; align-items: center; gap: 8px;
box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
}
.eject-mouth {
width: 72%; height: 18px; background: #0d0d0d; border-radius: 3px;
box-shadow: inset 0 3px 6px rgba(0,0,0,0.9), 0 1px 0 rgba(255,255,255,0.15);
position: relative; overflow: hidden;
}
.eject-mouth::after {
content: ‘’; position: absolute; top: 50%; left: 0; right: 0; height: 1px;
background: linear-gradient(90deg, transparent, rgba(100,120,200,0.2), transparent);
transform: translateY(-50%);
}

/* STRIP OUTER — hides strip above, reveals as it ejects */
.strip-stage-outer {
width: 100%; max-width: 440px;
display: flex; justify-content: center;
/* clip overflow so strip only appears below machine */
overflow: hidden;
/* give it enough height for the full strip once ejected */
max-height: 0;
transition: max-height 2.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.strip-stage-outer.ejecting {
max-height: 800px; /* large enough to show full strip */
}

.film-strip-outer {
width: 160px;
transform: translateY(-100%);
transition: transform 2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.film-strip-outer.ejected {
transform: translateY(0);
}

/* FILM STRIP */
.film-strip {
width: 160px; background: #111;
border-left: 2.5px solid #252525; border-right: 2.5px solid #252525;
display: flex; flex-direction: column; align-items: center;
box-shadow: 0 12px 40px rgba(0,0,0,0.5); border-radius: 0 0 3px 3px;
}
.perf-row { display: flex; justify-content: space-between; padding: 2.5px 5px; width: 100%; background: #111; }
.perf { width: 9px; height: 7px; background: #0a0a0a; border-radius: 2px; border: 1px solid #1e1e1e; box-shadow: inset 0 1px 2px rgba(0,0,0,0.5); }

.film-slot {
width: 148px; height: 144px; background: #1a1a1a; overflow: hidden;
position: relative; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
/* photos hidden initially, revealed after eject */
.film-slot img {
width: 100%; height: 100%; object-fit: cover; display: block;
opacity: 0;
transition: opacity 0.5s ease;
}
.film-slot img.visible { opacity: 1; }
.film-slot .enum { font-family: ‘VT323’, monospace; font-size: 1.8rem; color: #2a2a2a; }

.text-band {
width: 100%; background: #f0ece4;
display: flex; align-items: center; justify-content: center;
padding: 4px 6px; min-height: 28px;
}
.text-band span { font-family: ‘VT323’, monospace; font-size: 0.85rem; color: #888; letter-spacing: 1px; text-align: center; }

.strip-bottom {
width: 100%; background: #f0ece4; padding: 5px 10px 4px;
display: flex; align-items: center; justify-content: space-between;
}
.strip-bottom .sb-text { font-family: ‘Space Mono’, monospace; font-size: 0.55rem; color: #444; letter-spacing: 3px; }
.strip-bottom .sb-scissors { font-size: 0.9rem; color: #aaa; transform: rotate(45deg); display: inline-block; }

.serrated {
width: 100%; height: 10px;
background: radial-gradient(circle at 5px 0, #111 5px, #f0ece4 5px) repeat-x bottom / 10px 10px;
flex-shrink: 0;
}

/* SAVE ROW */
.save-row { display: flex; gap: 8px; width: 88%; max-width: 360px; padding-top: 12px; }

#fileInput { display: none; }
canvas#outCanvas { display: none; }
</style>

</head>

  <div class="save-row" id="saveRow" style="display:none">
    <button class="btn btn-ghost" onclick="retake()">↺ RETAKE</button>
    <button class="btn btn-save" onclick="saveStrip()">↓ SAVE STRIP</button>

</div>

<input type="file" id="fileInput" accept="image/*" multiple onchange="handleUpload(event)">
<canvas id="outCanvas"></canvas>

<script>
const vid = document.getElementById('vid');
const cdOverlay = document.getElementById('cdOverlay');
const cdNum = document.getElementById('cdNum');
const shotOverlay = document.getElementById('shotOverlay');
const vfFilter = document.getElementById('vfFilter');
const statusTxt = document.getElementById('statusTxt');
const shootBtn = document.getElementById('shootBtn');
const saveRow = document.getElementById('saveRow');
const stripStage = document.getElementById('stripStage');
const stripOuter = document.getElementById('stripOuter');
const outCanvas = document.getElementById('outCanvas');

let stream = null, facingMode = 'user', currentFilter = 'color';
let captured = [], shooting = false, uploads = [];

const CSS_FILTER = {
  bw: 'grayscale(100%) contrast(1.15) brightness(0.88)',
  color: 'saturate(1.1) contrast(1.05)',
  y2k: 'saturate(1.3) brightness(1.2) contrast(0.83)',
};

async function startCam() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width:{ideal:720}, height:{ideal:720} }, audio:false
    });
    vid.srcObject = stream;
    applyFilter();
  } catch(e) { statusTxt.textContent = 'camera error'; }
}

function applyFilter() {
  vid.style.filter = CSS_FILTER[currentFilter];
  vfFilter.className = 'vf-filter' + (currentFilter==='y2k' ? ' y2k' : '');
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
  document.getElementById('f-'+f).classList.add('on');
  applyFilter();
}

function flipCam() { facingMode = facingMode==='user'?'environment':'user'; startCam(); }

function handleUpload(e) {
  const files = Array.from(e.target.files).slice(0,4);
  uploads = [];
  Promise.all(files.map(f => new Promise(r => {
    const fr = new FileReader(); fr.onload = ev => r(ev.target.result); fr.readAsDataURL(f);
  }))).then(imgs => {
    uploads = imgs;
    while(uploads.length < 4) uploads.push(imgs[imgs.length-1]);
    statusTxt.textContent = imgs.length + ' photos loaded';
  });
  e.target.value='';
}

async function startSession() {
  if (shooting) return;
  shooting = true; captured = [];
  shootBtn.disabled = true; saveRow.style.display = 'none';

  // Reset strip — pull it back up and hide stage
  stripOuter.classList.remove('ejected');
  stripStage.classList.remove('ejecting');
  for(let i=0;i<4;i++){
    const s = document.getElementById('slot'+i);
    s.innerHTML = '<span class="enum">0'+(i+1)+'</span>';
    document.getElementById('pd'+i).className = 'pd';
  }

  // ONE countdown
  statusTxt.textContent = 'get ready!';
  await countdown321();

  // Rapid fire 4 shots — capture only, NO display yet
  for(let i=0;i<4;i++){
    document.getElementById('pd'+i).classList.add('active');
    statusTxt.textContent = 'shot '+(i+1)+' of 4';
    await captureShot(i);   // captures to array, doesn't show
    document.getElementById('pd'+i).classList.remove('active');
    document.getElementById('pd'+i).classList.add('done');
    if(i<3) await delay(550);
  }

  // Now eject — strip slides down, THEN photos reveal one by one
  statusTxt.textContent = 'printing...';
  await delay(300);

  // Start the eject animation
  stripStage.classList.add('ejecting');   // open max-height
  await delay(100);                        // let layout settle
  stripOuter.classList.add('ejected');    // slide strip down

  // Wait for strip to finish sliding (~2s)
  await delay(2100);

  // Reveal photos one by one with a slight stagger
  for(let i=0;i<4;i++){
    const slot = document.getElementById('slot'+i);
    // inject the img (hidden via opacity:0)
    slot.innerHTML = '';
    const img = document.createElement('img');
    img.src = captured[i];
    slot.appendChild(img);
    // force reflow then fade in
    await delay(20);
    img.classList.add('visible');
    await delay(350);
  }

  statusTxt.textContent = 'done ✓';
  saveRow.style.display = 'flex';
  shooting = false; shootBtn.disabled = false;
}

function countdown321() {
  return new Promise(res => {
    let n = 3;
    cdNum.textContent = n; cdOverlay.classList.add('show'); refreshCd();
    const t = setInterval(() => {
      n--;
      if(n <= 0) { clearInterval(t); cdOverlay.classList.remove('show'); res(); }
      else { cdNum.textContent = n; refreshCd(); }
    }, 1000);
  });
}
function refreshCd() {
  cdNum.style.animation = 'none';
  requestAnimationFrame(() => { cdNum.style.animation = 'cdPop 0.55s cubic-bezier(0.34,1.56,0.64,1)'; });
}

async function captureShot(idx) {
  // flash
  shotOverlay.style.opacity = '1'; shotOverlay.style.transition = 'opacity 0.05s';
  await delay(80);
  shotOverlay.style.transition = 'opacity 0.3s'; shotOverlay.style.opacity = '0';

  if(uploads.length >= 4) { captured[idx] = uploads[idx]; return; }

  const sz = 400;
  const c = document.createElement('canvas'); c.width = sz; c.height = sz;
  const ctx = c.getContext('2d');
  ctx.filter = CSS_FILTER[currentFilter];
  if(facingMode==='user'){ ctx.translate(sz,0); ctx.scale(-1,1); }
  ctx.drawImage(vid,0,0,sz,sz);
  ctx.setTransform(1,0,0,1,0,0);
  if(currentFilter==='y2k'){
    ctx.globalCompositeOperation='screen'; ctx.globalAlpha=0.1;
    const g=ctx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz/1.4);
    g.addColorStop(0,'rgba(255,200,230,1)'); g.addColorStop(1,'rgba(200,170,255,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,sz,sz);
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
  }
  captured[idx] = c.toDataURL('image/jpeg',0.93);
}

function retake() {
  captured = []; uploads = [];
  stripOuter.classList.remove('ejected');
  stripStage.classList.remove('ejecting');
  for(let i=0;i<4;i++){
    document.getElementById('slot'+i).innerHTML='<span class="enum">0'+(i+1)+'</span>';
    document.getElementById('pd'+i).className='pd';
  }
  saveRow.style.display='none'; statusTxt.textContent='ready';
}

async function saveStrip() {
  const imgs = captured.filter(Boolean);
  if(imgs.length < 4){ statusTxt.textContent='need 4 shots'; return; }
  const SW=280,SH=273,PX=16,PY=6,PERF=16,TEXT=28,BRAND=32,SERR=12;
  const W=SW+PX*2;
  const H=PY+4*(PERF+SH)+TEXT+BRAND+SERR+8;
  outCanvas.width=W; outCanvas.height=H;
  const ctx=outCanvas.getContext('2d');
  ctx.fillStyle='#111'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#0a0a0a';
  for(let i=0;i<24;i++){
    const y=PY+i*((H-PY*2)/24);
    rr(ctx,4,y,10,8,2); ctx.fill(); rr(ctx,W-14,y,10,8,2); ctx.fill();
  }
  let cy=PY;
  for(let i=0;i<4;i++){
    cy+=PERF;
    const el=await loadImg(imgs[i]);
    ctx.save(); rr(ctx,PX,cy,SW,SH,0); ctx.clip();
    ctx.drawImage(el,PX,cy,SW,SH);
    if(currentFilter==='y2k'){
      ctx.globalCompositeOperation='screen'; ctx.globalAlpha=0.08;
      const g=ctx.createRadialGradient(PX+SW/2,cy+SH/2,0,PX+SW/2,cy+SH/2,SW/1.3);
      g.addColorStop(0,'rgba(255,200,230,1)'); g.addColorStop(1,'rgba(200,170,255,0)');
      ctx.fillStyle=g; ctx.fillRect(PX,cy,SW,SH);
      ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
    }
    ctx.restore(); cy+=SH;
    if(i===0){
      ctx.fillStyle='#f0ece4'; ctx.fillRect(0,cy,W,TEXT);
      ctx.fillStyle='#888'; ctx.font='13px Space Mono,monospace'; ctx.textAlign='center';
      ctx.fillText('\u266a \u02d0\u02d0 coldrain \u02d0\u02d0 \u266a',W/2,cy+19);
      cy+=TEXT;
    }
  }
  ctx.fillStyle='#f0ece4'; ctx.fillRect(0,cy,W,BRAND);
  ctx.fillStyle='#444'; ctx.font='bold 10px Space Mono,monospace'; ctx.textAlign='left'; ctx.fillText('coldrain',PX,cy+21);
  ctx.fillStyle='#aaa'; ctx.font='15px serif'; ctx.textAlign='right'; ctx.fillText('✂',W-PX,cy+22);
  cy+=BRAND;
  ctx.fillStyle='#f0ece4';
  for(let x=0;x<W;x+=10){
    ctx.beginPath(); ctx.moveTo(x,cy); ctx.lineTo(x+5,cy+SERR); ctx.lineTo(x+10,cy); ctx.fill();
  }
  const a=document.createElement('a');
  a.download='coldrain-strip.jpg';
  a.href=outCanvas.toDataURL('image/jpeg',0.95);
  a.click(); statusTxt.textContent='saved ✓';
}

function rr(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}
function loadImg(src){ return new Promise((r,j)=>{ const i=new Image(); i.onload=()=>r(i); i.onerror=j; i.src=src; }); }
function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

startCam();
</script>

</body>
</html>
