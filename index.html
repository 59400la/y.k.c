.page {
width: 100%; max-width: 440px;
display: flex; flex-direction: column; align-items: center;
padding-bottom: 60px;
position: relative; z-index: 1;
}

/* ── LOGO ── */
.logo-section {
padding: 32px 20px 20px;
display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.logo-wrap {
background: #fff;
border-radius: 4px;
padding: 5px 14px;
display: inline-flex; align-items: center; justify-content: center;
box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.logo-img { width: 160px; display: block; }
.logo-sub {
font-family: ‘VT323’, monospace; font-size: 0.9rem;
letter-spacing: 8px; color: rgba(20,10,5,0.6); text-transform: uppercase;
text-shadow: 0 1px 3px rgba(255,200,150,0.4);
}

/* ── MACHINE — matte black ── */
.machine-body {
width: 88%; max-width: 360px;
background: linear-gradient(180deg, #1e1e1e 0%, #111 50%, #161616 100%);
border-radius: 16px 16px 8px 8px;
box-shadow:
0 8px 32px rgba(0,0,0,0.6),
0 0 0 1px rgba(255,255,255,0.06) inset,
0 1px 0 rgba(255,255,255,0.08) inset;
padding: 16px 16px 0;
display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.machine-detail {
width: 100%; display: flex; justify-content: space-between;
align-items: center; padding: 0 4px;
}
.machine-label {
font-family: ‘VT323’, monospace; font-size: 0.75rem;
letter-spacing: 4px; color: rgba(255,255,255,0.2);
}
.machine-dots { display: flex; gap: 5px; }
.mdot {
width: 7px; height: 7px; border-radius: 50%;
background: rgba(255,255,255,0.08);
box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
}
.mdot.green { background: #3a3; box-shadow: 0 0 5px #3a3; }

/* ── VIEWFINDER ── */
.vf-wrap {
width: 100%; background: #050505;
border-radius: 8px; padding: 7px;
box-shadow: inset 0 2px 8px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04) inset;
}
/* Aspect ratio matches photo cell: 431w × avg286h ≈ 431:286 */
.viewfinder {
width: 100%;
aspect-ratio: 431 / 286;
background: #000; border-radius: 3px; overflow: hidden; position: relative;
}
.viewfinder video {
position: absolute; inset: 0;
width: 100%; height: 100%;
object-fit: cover; display: block;
transform: scaleX(-1);
}
.vf-filter { position: absolute; inset: 0; pointer-events: none; }
.vf-filter.y2k {
background: linear-gradient(135deg, rgba(255,180,220,0.2), rgba(210,170,255,0.18));
mix-blend-mode: screen;
}
.cd-overlay {
position: absolute; inset: 0;
display: flex; align-items: center; justify-content: center;
background: rgba(0,0,0,0.5);
opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.cd-overlay.show { opacity: 1; }
.cd-num {
font-family: ‘VT323’, monospace; font-size: 7rem; color: #fff; line-height: 1;
text-shadow: 0 0 40px rgba(220,160,255,0.9);
animation: cdPop 0.55s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes cdPop { from { transform: scale(3); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.shot-overlay { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; }

/* ── FILTER ROW ── */
.filter-row { display: flex; gap: 6px; width: 100%; }
.fbtn {
flex: 1; padding: 8px 4px;
border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.4);
font-family: ‘VT323’, monospace; font-size: 1rem; letter-spacing: 1px;
cursor: pointer; transition: all 0.2s;
}
.fbtn.on {
background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9);
border-color: rgba(255,255,255,0.25);
box-shadow: 0 0 12px rgba(255,255,255,0.06);
}

/* ── BUTTONS ── */
.ctrl-row { display: flex; gap: 8px; width: 100%; }
.btn {
flex: 1; padding: 11px 6px; border: none; border-radius: 6px;
font-family: ‘Space Mono’, monospace; font-size: 0.7rem; letter-spacing: 1px;
cursor: pointer; transition: all 0.15s; text-transform: uppercase;
}
.btn:active { transform: scale(0.96); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-ghost {
background: rgba(255,255,255,0.08);
border: 1px solid rgba(255,255,255,0.12);
color: rgba(255,255,255,0.6);
}
.btn-ghost:not(:disabled):hover { background: rgba(255,255,255,0.14); }
.btn-shoot {
flex: 2;
background: linear-gradient(180deg, #2a2a2a 0%, #0d0d0d 100%);
color: rgba(255,255,255,0.9);
font-size: 0.82rem; font-weight: 700; letter-spacing: 3px;
border: 1px solid rgba(255,255,255,0.1);
box-shadow: 0 3px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.07);
}
.btn-shoot:not(:disabled):hover { background: linear-gradient(180deg, #333 0%, #141414 100%); }
.btn-save {
background: rgba(255,255,255,0.1);
border: 1px solid rgba(255,255,255,0.15);
color: rgba(255,255,255,0.75);
}

/* ── PROGRESS ── */
.prog-row { display: flex; gap: 10px; align-items: center; }
.pd { width: 32px; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.1); transition: all 0.4s; }
.pd.active { background: rgba(255,255,255,0.6); box-shadow: 0 0 6px rgba(255,255,255,0.3); }
.pd.done { background: rgba(255,255,255,0.3); }
.status {
font-family: ‘VT323’, monospace; font-size: 1rem; letter-spacing: 3px;
color: rgba(255,255,255,0.35); text-align: center; min-height: 1.4em;
}

/* ── SLOT HOUSING — matte black ── */
.slot-housing {
width: 100%;
background: linear-gradient(180deg, #0e0e0e 0%, #080808 100%);
border-radius: 0 0 8px 8px; padding: 10px 16px 14px;
display: flex; flex-direction: column; align-items: center;
box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
}
.eject-mouth {
width: 56%; height: 16px; background: #030303; border-radius: 2px;
box-shadow: inset 0 2px 6px rgba(0,0,0,1), 0 1px 0 rgba(255,255,255,0.05);
}

/* ── STRIP STAGE ── */
.strip-stage-outer {
width: 100%; max-width: 440px;
display: flex; justify-content: center;
overflow: hidden;
max-height: 0;
transition: max-height 2.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.strip-stage-outer.ejecting { max-height: 1200px; }

.film-strip-outer {
width: 220px;
transform: translateY(-100%);
transition: transform 2.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
position: relative; flex-shrink: 0;
}
.film-strip-outer.ejected { transform: translateY(0); }

.film-strip {
width: 100%; position: relative; line-height: 0;
}

/* Frame PNG on top — transparent holes show photos through */
.strip-frame {
width: 100%; display: block;
position: relative; z-index: 10; pointer-events: none;
}

/* Photos BEHIND frame, absolutely positioned */
.photos-layer {
position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
}

/* DEFINITIVE positions from pixel analysis:
PNG: 508x1384
Left border ends at x=35 → photo starts x=36 → left=7.0866%
Right border starts at x=468 → photo ends x=467 → right=91.9291%
Width = 431px → 84.8425%

cell0: y=37-321   top=2.6734%  h=20.5202%
cell1: y=344-633  top=24.8555% h=20.8815%
cell2: y=678-980  top=48.9884% h=21.8208%
cell3: y=1010-1280 top=72.9769% h=19.5087%
*/
.photo-cell {
position: absolute;
left: 7.0866%;
width: 84.8425%;
overflow: hidden;
background: #0a0a0a;
}
#cell0 { top: 2.6734%;  height: 20.5202%; }
#cell1 { top: 24.8555%; height: 20.8815%; }
#cell2 { top: 48.9884%; height: 21.8208%; }
#cell3 { top: 72.9769%; height: 19.5087%; }

.photo-cell img {
position: absolute; inset: 0;
width: 100%; height: 100%;
object-fit: cover; object-position: center;
display: block;
opacity: 0; transition: opacity 0.5s ease;
}
.photo-cell img.visible { opacity: 1; }
.photo-cell .enum {
font-family: ‘VT323’, monospace; font-size: 1.4rem; color: #222;
position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
}

/* ── SAVE ROW ── */
.save-row {
display: flex; gap: 8px; width: 88%; max-width: 360px; padding-top: 12px;
}

#fileInput { display: none; }
canvas#outCanvas { display: none; }
</style>

  <div class="save-row" id="saveRow" style="display:none">
    <button class="btn btn-ghost" onclick="retake()">↺ RETAKE</button>
    <button class="btn btn-save" onclick="saveStrip()">↓ SAVE STRIP</button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" multiple onchange="handleUpload(event)">
<canvas id="outCanvas"></canvas>

<script>
const vid       = document.getElementById('vid');
const cdOverlay = document.getElementById('cdOverlay');
const cdNum     = document.getElementById('cdNum');
const shotOv    = document.getElementById('shotOverlay');
const vfFilter  = document.getElementById('vfFilter');
const statusTxt = document.getElementById('statusTxt');
const shootBtn  = document.getElementById('shootBtn');
const saveRow   = document.getElementById('saveRow');
const stripStage= document.getElementById('stripStage');
const stripOuter= document.getElementById('stripOuter');
const stripFrame= document.getElementById('stripFrame');
const outCanvas = document.getElementById('outCanvas');

let stream=null, facingMode='user', currentFilter='color';
let captured=[], shooting=false, uploads=[];

// Cell dimensions in native PNG pixels (508x1384)
const CELLS_PX = [
  {x:36, y:37,   w:431, h:284},
  {x:36, y:344,  w:431, h:289},
  {x:36, y:678,  w:431, h:302},
  {x:36, y:1010, w:431, h:270},
];

const CSS_FILTER = {
  bw:    'grayscale(100%) contrast(1.15) brightness(0.88)',
  color: 'saturate(1.1) contrast(1.05)',
  y2k:   'saturate(1.3) brightness(1.2) contrast(0.83)',
};

async function startCam() {
  try {
    if (stream) stream.getTracks().forEach(t=>t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode, width:{ideal:1280}, height:{ideal:853} }, audio:false
    });
    vid.srcObject = stream;
    applyFilter();
  } catch(e) { statusTxt.textContent='camera error'; }
}

function applyFilter() {
  vid.style.filter = CSS_FILTER[currentFilter];
  vfFilter.className = 'vf-filter'+(currentFilter==='y2k'?' y2k':'');
  vid.style.transform = (facingMode==='user') ? 'scaleX(-1)' : 'scaleX(1)';
}
function setFilter(f) {
  currentFilter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('f-'+f).classList.add('on');
  applyFilter();
}
function flipCam() { facingMode=facingMode==='user'?'environment':'user'; startCam(); }

function handleUpload(e) {
  const files=Array.from(e.target.files).slice(0,4);
  uploads=[];
  Promise.all(files.map(f=>new Promise(r=>{
    const fr=new FileReader(); fr.onload=ev=>r(ev.target.result); fr.readAsDataURL(f);
  }))).then(imgs=>{
    uploads=imgs;
    while(uploads.length<4) uploads.push(imgs[imgs.length-1]);
    statusTxt.textContent=imgs.length+' photos loaded';
  });
  e.target.value='';
}

async function startSession() {
  if(shooting) return;
  shooting=true; captured=[];
  shootBtn.disabled=true; saveRow.style.display='none';
  stripOuter.classList.remove('ejected');
  stripStage.classList.remove('ejecting');
  for(let i=0;i<4;i++){
    document.getElementById('cell'+i).innerHTML='<span class="enum">0'+(i+1)+'</span>';
    document.getElementById('pd'+i).className='pd';
  }
  statusTxt.textContent='get ready!';
  await countdown321();
  for(let i=0;i<4;i++){
    document.getElementById('pd'+i).classList.add('active');
    statusTxt.textContent='shot '+(i+1)+' of 4';
    await captureShot(i);
    document.getElementById('pd'+i).classList.remove('active');
    document.getElementById('pd'+i).classList.add('done');
    if(i<3) await delay(600);
  }
  statusTxt.textContent='printing...';
  await delay(300);
  stripStage.classList.add('ejecting');
  await delay(100);
  stripOuter.classList.add('ejected');
  await delay(2300);
  for(let i=0;i<4;i++){
    const cell=document.getElementById('cell'+i);
    cell.innerHTML='';
    const img=document.createElement('img');
    img.src=captured[i];
    cell.appendChild(img);
    await delay(30);
    img.classList.add('visible');
    await delay(420);
  }
  statusTxt.textContent='done ✓';
  saveRow.style.display='flex';
  shooting=false; shootBtn.disabled=false;
}

function countdown321(){
  return new Promise(res=>{
    let n=3; cdNum.textContent=n; cdOverlay.classList.add('show'); refreshCd();
    const t=setInterval(()=>{
      n--;
      if(n<=0){clearInterval(t); cdOverlay.classList.remove('show'); res();}
      else{cdNum.textContent=n; refreshCd();}
    },1000);
  });
}
function refreshCd(){
  cdNum.style.animation='none';
  requestAnimationFrame(()=>{ cdNum.style.animation='cdPop 0.55s cubic-bezier(0.34,1.56,0.64,1)'; });
}

async function captureShot(idx){
  shotOv.style.opacity='1'; shotOv.style.transition='opacity 0.05s';
  await delay(80);
  shotOv.style.transition='opacity 0.3s'; shotOv.style.opacity='0';

  if(uploads.length>=4){ captured[idx]=uploads[idx]; return; }

  const {w,h} = CELLS_PX[idx];
  // Capture at 2x resolution for quality
  const CW=w*2, CH=h*2;
  const c=document.createElement('canvas');
  c.width=CW; c.height=CH;
  const ctx=c.getContext('2d');

  // Cover-crop video to fill exact cell ratio
  const vW=vid.videoWidth||640, vH=vid.videoHeight||480;
  const vAR=vW/vH, dAR=CW/CH;
  let sx,sy,sw,sh;
  if(vAR>dAR){ sh=vH; sw=sh*dAR; sx=(vW-sw)/2; sy=0; }
  else        { sw=vW; sh=sw/dAR; sx=0; sy=(vH-sh)/2; }

  ctx.filter=CSS_FILTER[currentFilter];
  if(facingMode==='user'){ ctx.translate(CW,0); ctx.scale(-1,1); }
  ctx.drawImage(vid, sx,sy,sw,sh, 0,0,CW,CH);
  ctx.setTransform(1,0,0,1,0,0);

  if(currentFilter==='y2k'){
    ctx.globalCompositeOperation='screen'; ctx.globalAlpha=0.1;
    const g=ctx.createRadialGradient(CW/2,CH/2,0,CW/2,CH/2,CW/1.6);
    g.addColorStop(0,'rgba(255,200,230,1)'); g.addColorStop(1,'rgba(200,170,255,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
  }
  captured[idx]=c.toDataURL('image/jpeg',0.93);
}

function retake(){
  captured=[]; uploads=[];
  stripOuter.classList.remove('ejected');
  stripStage.classList.remove('ejecting');
  for(let i=0;i<4;i++){
    document.getElementById('cell'+i).innerHTML='<span class="enum">0'+(i+1)+'</span>';
    document.getElementById('pd'+i).className='pd';
  }
  saveRow.style.display='none'; statusTxt.textContent='ready';
}

async function saveStrip(){
  const imgs=captured.filter(Boolean);
  if(imgs.length<4){statusTxt.textContent='need 4 shots'; return;}

  const FW=508, FH=1384;
  outCanvas.width=FW; outCanvas.height=FH;
  const ctx=outCanvas.getContext('2d');
  ctx.clearRect(0,0,FW,FH);

  for(let i=0;i<4;i++){
    const {x,y,w,h}=CELLS_PX[i];
    const el=await loadImg(imgs[i]);
    // Cover-crop to exact cell ratio
    const sAR=el.naturalWidth/el.naturalHeight, dAR=w/h;
    let sx,sy,sw,sh;
    if(sAR>dAR){ sh=el.naturalHeight; sw=sh*dAR; sx=(el.naturalWidth-sw)/2; sy=0; }
    else        { sw=el.naturalWidth; sh=sw/dAR; sx=0; sy=(el.naturalHeight-sh)/2; }
    ctx.drawImage(el,sx,sy,sw,sh, x,y,w,h);
  }
  ctx.drawImage(stripFrame,0,0,FW,FH);

  const a=document.createElement('a');
  a.download='coldrain-strip.png';
  a.href=outCanvas.toDataURL('image/png');
  a.click();
  statusTxt.textContent='saved ✓';
}

function loadImg(src){return new Promise((r,j)=>{const i=new Image(); i.onload=()=>r(i); i.onerror=j; i.src=src;});}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}

startCam();
</script>
