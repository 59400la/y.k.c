<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>coldrain photobooth</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
min-height: 100vh;
background:
radial-gradient(ellipse at 18% 28%, rgba(255,255,255,0.92) 0%, transparent 38%),
radial-gradient(ellipse at 72% 18%, rgba(255,255,255,0.88) 0%, transparent 32%),
radial-gradient(ellipse at 48% 58%, rgba(255,255,255,0.65) 0%, transparent 42%),
radial-gradient(ellipse at 8%  72%, rgba(255,255,255,0.72) 0%, transparent 28%),
radial-gradient(ellipse at 88% 62%, rgba(255,255,255,0.78) 0%, transparent 32%),
linear-gradient(180deg, #87ceeb 0%, #b8e0f7 40%, #d4eeff 70%, #e8f5ff 100%);
font-family: ‘Space Mono’, monospace;
display: flex; flex-direction: column; align-items: center;
overflow-x: hidden;
}

.page {
width: 100%; max-width: 440px;
display: flex; flex-direction: column; align-items: center;
padding-bottom: 60px;
}

/* LOGO */
.logo-section {
padding: 32px 20px 20px;
display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.logo-img {
width: 200px;
/* mix-blend-mode multiply removes white background */
mix-blend-mode: multiply;
}
.logo-sub {
font-family: ‘VT323’, monospace; font-size: 0.9rem;
letter-spacing: 8px; color: rgba(30,60,100,0.5); text-transform: uppercase;
}

/* MACHINE */
.machine-body {
width: 88%; max-width: 360px;
background: linear-gradient(180deg, #d0d4dc 0%, #bfc3cc 40%, #c8ccd4 100%);
border-radius: 16px 16px 8px 8px;
box-shadow: 0 8px 32px rgba(0,0,0,0.25),
0 0 0 1px rgba(255,255,255,0.3) inset,
0 -2px 0 rgba(0,0,0,0.2) inset;
padding: 16px 16px 0;
display: flex; flex-direction: column; align-items: center; gap: 10px;
}

.machine-detail {
width: 100%; display: flex; justify-content: space-between;
align-items: center; padding: 0 4px;
}
.machine-label {
font-family: ‘VT323’, monospace; font-size: 0.75rem;
letter-spacing: 4px; color: rgba(60,60,80,0.5);
}
.machine-dots { display: flex; gap: 5px; }
.mdot {
width: 7px; height: 7px; border-radius: 50%;
background: rgba(0,0,0,0.15);
box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
}
.mdot.green { background: #4caf50; box-shadow: 0 0 4px #4caf50; }

/* VIEWFINDER */
.vf-wrap {
width: 100%; background: #0a0a0a;
border-radius: 8px; padding: 8px;
box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);
}

/* The viewfinder shows camera + frame overlay */
.viewfinder {
width: 100%;
/* match the frame image aspect ratio: the frame jpg is portrait ~0.44:1 (width:height) */
/* Frame image is the full strip — we use it as overlay on the camera preview */
aspect-ratio: 1 / 1;
background: #000;
border-radius: 4px;
overflow: hidden;
position: relative;
}

.viewfinder video {
width: 100%; height: 100%; object-fit: cover;
display: block;
/* MIRROR for selfie */
transform: scaleX(-1);
}

opacity: 0.85;

}

/* countdown */
.cd-overlay {
position: absolute; inset: 0;
display: flex; align-items: center; justify-content: center;
background: rgba(0,0,0,0.45);
opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.cd-overlay.show { opacity: 1; }
.cd-num {
font-family: ‘VT323’, monospace; font-size: 9rem; color: #fff; line-height: 1;
text-shadow: 0 0 40px rgba(200,150,255,0.8);
animation: cdPop 0.55s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes cdPop {
from { transform: scale(3); opacity: 0; }
to   { transform: scale(1); opacity: 1; }
}
.shot-overlay {
position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none;
}

/* vf filter for y2k */
.vf-filter { position: absolute; inset: 0; pointer-events: none; }
.vf-filter.y2k {
background: linear-gradient(135deg, rgba(255,180,220,0.2), rgba(210,170,255,0.18));
mix-blend-mode: screen;
}

/* FILTER ROW */
.filter-row { display: flex; gap: 6px; width: 100%; }
.fbtn {
flex: 1; padding: 8px 4px;
border: 1px solid rgba(0,0,0,0.15); border-radius: 20px;
background: rgba(255,255,255,0.4); color: rgba(40,40,60,0.5);
font-family: ‘VT323’, monospace; font-size: 1rem; letter-spacing: 1px;
cursor: pointer; backdrop-filter: blur(4px); transition: all 0.2s;
}
.fbtn.on {
background: rgba(255,255,255,0.75); color: #1a1a3a;
border-color: rgba(0,0,0,0.25); box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* BUTTONS */
.ctrl-row { display: flex; gap: 8px; width: 100%; }
.btn {
flex: 1; padding: 11px 6px; border: none; border-radius: 6px;
font-family: ‘Space Mono’, monospace; font-size: 0.7rem; letter-spacing: 1px;
cursor: pointer; transition: all 0.15s; text-transform: uppercase;
}
.btn:active { transform: scale(0.96); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-ghost {
background: rgba(255,255,255,0.45); border: 1px solid rgba(0,0,0,0.15);
color: rgba(30,30,60,0.7); backdrop-filter: blur(4px);
}
.btn-ghost:not(:disabled):hover { background: rgba(255,255,255,0.65); }
.btn-shoot {
flex: 2; background: linear-gradient(180deg, #2a2a2a 0%, #111 100%);
color: #eee; font-size: 0.8rem; font-weight: 700; letter-spacing: 3px;
box-shadow: 0 3px 12px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
}
.btn-shoot:not(:disabled):hover { background: linear-gradient(180deg, #333 0%, #1a1a1a 100%); }
.btn-save {
background: rgba(255,255,255,0.5); border: 1px solid rgba(0,0,0,0.2);
color: #1a1a3a; backdrop-filter: blur(4px);
}

/* PROGRESS */
.prog-row { display: flex; gap: 10px; align-items: center; }
.pd { width: 32px; height: 4px; border-radius: 2px; background: rgba(0,0,0,0.15); transition: all 0.4s; }
.pd.active { background: rgba(30,30,80,0.6); box-shadow: 0 0 6px rgba(100,100,200,0.4); }
.pd.done { background: rgba(30,30,80,0.35); }

.status {
font-family: ‘VT323’, monospace; font-size: 1rem; letter-spacing: 3px;
color: rgba(30,60,100,0.55); text-align: center; min-height: 1.4em;
}

/* SLOT HOUSING at bottom of machine */
.slot-housing {
width: 100%; background: linear-gradient(180deg, #aab0bc 0%, #9a9faa 100%);
border-radius: 0 0 8px 8px; padding: 10px 16px 14px;
display: flex; flex-direction: column; align-items: center;
box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
}
.eject-mouth {
width: 72%; height: 18px; background: #0d0d0d; border-radius: 3px;
box-shadow: inset 0 3px 6px rgba(0,0,0,0.9), 0 1px 0 rgba(255,255,255,0.15);
}

/* ── STRIP STAGE ── */
.strip-stage-outer {
width: 100%; max-width: 440px;
display: flex; justify-content: center;
overflow: hidden;
max-height: 0;
transition: max-height 2.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.strip-stage-outer.ejecting { max-height: 900px; }

.film-strip-outer {
/* The strip image determines the width — keep its natural ratio */
width: 190px;
transform: translateY(-100%);
transition: transform 2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
position: relative;
}
.film-strip-outer.ejected { transform: translateY(0); }

/* The whole strip is a positioned container with the frame image as bg */
.film-strip {
width: 190px;
position: relative;
/* Use the actual frame image as the strip background */
background: #111;
}

/* Frame image sits on top of everything */
.strip-frame-img {
width: 100%;
display: block;
position: relative;
z-index: 10;
pointer-events: none;
/* remove white bg from jpeg — multiply blends black frame over photos */
mix-blend-mode: multiply;
}

/* Photos are positioned absolutely inside the strip, behind the frame */
.photos-layer {
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
z-index: 1;
/* We position each photo at the right cell */
display: flex;
flex-direction: column;
}

/* Each photo cell — heights tuned to match the frame image proportions */
/* Frame image: ~163x550px source → 4 cells + text band + bottom bar */
/* Approx breakdown (as % of total height):
slot0: 0–24%
textband: 24–30%
slot1: 30–54%
slot2: 54–77%
slot3: 77–96%
bottom bar: 96–100%
*/
.photo-cell {
width: 100%;
overflow: hidden;
position: relative;
display: flex; align-items: center; justify-content: center;
background: #1a1a1a;
flex-shrink: 0;
}
.photo-cell img {
width: 100%; height: 100%; object-fit: cover;
display: block;
opacity: 0;
transition: opacity 0.5s ease;
}
.photo-cell img.visible { opacity: 1; }
.photo-cell .enum {
font-family: ‘VT323’, monospace; font-size: 1.6rem; color: #2a2a2a;
}

/* text band cell */
.text-cell {
width: 100%;
background: #f0ece4;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
}
.text-cell span {
font-family: ‘VT323’, monospace; font-size: 0.8rem; color: #888; letter-spacing: 1px;
}

/* bottom brand cell */
.brand-cell {
width: 100%; background: #f0ece4;
display: flex; align-items: center; justify-content: space-between;
padding: 0 8px; flex-shrink: 0;
}
.brand-cell .bc-text {
font-family: ‘Space Mono’, monospace; font-size: 0.45rem; color: #555; letter-spacing: 2px;
}
.brand-cell .bc-scissors { font-size: 0.8rem; color: #aaa; transform: rotate(45deg); display: inline-block; }

/* SAVE ROW */
.save-row {
display: flex; gap: 8px; width: 88%; max-width: 360px; padding-top: 12px;
}

#fileInput { display: none; }
canvas#outCanvas { display: none; }
</style>

  <div class="save-row" id="saveRow" style="display:none">
    <button class="btn btn-ghost" onclick="retake()">↺ RETAKE</button>
    <button class="btn btn-save" onclick="saveStrip()">↓ SAVE STRIP</button>

<input type="file" id="fileInput" accept="image/*" multiple onchange="handleUpload(event)">
<canvas id="outCanvas"></canvas>

<script>
const vid = document.getElementById('vid');
const cdOverlay = document.getElementById('cdOverlay');
const cdNum = document.getElementById('cdNum');
const shotOverlay = document.getElementById('shotOverlay');
const vfFilter = document.getElementById('vfFilter');
const statusTxt = document.getElementById('statusTxt');
const shootBtn = document.getElementById('shootBtn');
const saveRow = document.getElementById('saveRow');
const stripStage = document.getElementById('stripStage');
const stripOuter = document.getElementById('stripOuter');
const frameImg = document.getElementById('frameImg');
const outCanvas = document.getElementById('outCanvas');

let stream = null, facingMode = 'user', currentFilter = 'color';
let captured = [], shooting = false, uploads = [];

const CSS_FILTER = {
  bw:    'grayscale(100%) contrast(1.15) brightness(0.88)',
  color: 'saturate(1.1) contrast(1.05)',
  y2k:   'saturate(1.3) brightness(1.2) contrast(0.83)',
};

// ── Measure frame image and set cell heights ──
// The frame (IMG_5160) has these approximate proportions:
// Total strip height. We measure after image loads.
// Approximate cell boundaries as fraction of total strip height:
const CELL_FRACS = {
  cell0:     { top: 0.000, bot: 0.238 },
  textCell:  { top: 0.238, bot: 0.300 },
  cell1:     { top: 0.300, bot: 0.536 },
  cell2:     { top: 0.536, bot: 0.770 },
  cell3:     { top: 0.770, bot: 0.958 },
  brandCell: { top: 0.958, bot: 1.000 },
};

// Also horizontal margins (frame has thick black border left/right)
// Approximate: photo content starts ~8% from left, ends ~8% from right
const LEFT_FRAC  = 0.055;
const RIGHT_FRAC = 0.055;

function setPhotosLayerGeometry() {
  const W = frameImg.offsetWidth;
  const H = frameImg.offsetHeight;
  if (!W || !H) return;

  const layer = document.getElementById('photosLayer');
  layer.style.position = 'absolute';
  layer.style.top = '0';
  layer.style.left = (LEFT_FRAC * W) + 'px';
  layer.style.width = (W * (1 - LEFT_FRAC - RIGHT_FRAC)) + 'px';
  layer.style.height = H + 'px';
  layer.style.display = 'flex';
  layer.style.flexDirection = 'column';

  Object.entries(CELL_FRACS).forEach(([id, frac]) => {
    const el = document.getElementById(id);
    if (el) {
      el.style.height = ((frac.bot - frac.top) * H) + 'px';
      el.style.flexShrink = '0';
    }
  });
}

frameImg.addEventListener('load', setPhotosLayerGeometry);
window.addEventListener('resize', setPhotosLayerGeometry);
// Also try immediately (might already be loaded from cache)
if (frameImg.complete) setPhotosLayerGeometry();

// ── Camera ──
async function startCam() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: {ideal:720}, height: {ideal:720} }, audio: false
    });
    vid.srcObject = stream;
    applyFilter();
  } catch(e) { statusTxt.textContent = 'camera error'; }
}

function applyFilter() {
  vid.style.filter = CSS_FILTER[currentFilter];
  vfFilter.className = 'vf-filter' + (currentFilter === 'y2k' ? ' y2k' : '');
  // Keep mirror on front cam
  vid.style.transform = (facingMode === 'user') ? 'scaleX(-1)' : 'scaleX(1)';
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
  document.getElementById('f-' + f).classList.add('on');
  applyFilter();
}

function flipCam() {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  startCam();
}

function handleUpload(e) {
  const files = Array.from(e.target.files).slice(0, 4);
  uploads = [];
  Promise.all(files.map(f => new Promise(r => {
    const fr = new FileReader(); fr.onload = ev => r(ev.target.result); fr.readAsDataURL(f);
  }))).then(imgs => {
    uploads = imgs;
    while (uploads.length < 4) uploads.push(imgs[imgs.length - 1]);
    statusTxt.textContent = imgs.length + ' photos loaded';
  });
  e.target.value = '';
}

// ── Session ──
async function startSession() {
  if (shooting) return;
  shooting = true; captured = [];
  shootBtn.disabled = true; saveRow.style.display = 'none';

  // Reset
  stripOuter.classList.remove('ejected');
  stripStage.classList.remove('ejecting');
  for (let i = 0; i < 4; i++) {
    const c = document.getElementById('cell' + i);
    c.innerHTML = '<span class="enum">0' + (i+1) + '</span>';
    document.getElementById('pd' + i).className = 'pd';
  }

  // Countdown once
  statusTxt.textContent = 'get ready!';
  await countdown321();

  // Rapid fire 4 shots
  for (let i = 0; i < 4; i++) {
    document.getElementById('pd' + i).classList.add('active');
    statusTxt.textContent = 'shot ' + (i+1) + ' of 4';
    await captureShot(i);
    document.getElementById('pd' + i).classList.remove('active');
    document.getElementById('pd' + i).classList.add('done');
    if (i < 3) await delay(550);
  }

  // Eject strip
  statusTxt.textContent = 'printing...';
  await delay(300);
  stripStage.classList.add('ejecting');
  await delay(80);
  stripOuter.classList.add('ejected');

  // Wait for strip to slide down
  await delay(2100);

  // Reveal photos one by one
  for (let i = 0; i < 4; i++) {
    const cell = document.getElementById('cell' + i);
    cell.innerHTML = '';
    const img = document.createElement('img');
    img.src = captured[i];
    cell.appendChild(img);
    await delay(30);
    img.classList.add('visible');
    await delay(380);
  }

  statusTxt.textContent = 'done ✓';
  saveRow.style.display = 'flex';
  shooting = false;
  shootBtn.disabled = false;
}

function countdown321() {
  return new Promise(res => {
    let n = 3;
    cdNum.textContent = n;
    cdOverlay.classList.add('show');
    refreshCd();
    const t = setInterval(() => {
      n--;
      if (n <= 0) { clearInterval(t); cdOverlay.classList.remove('show'); res(); }
      else { cdNum.textContent = n; refreshCd(); }
    }, 1000);
  });
}
function refreshCd() {
  cdNum.style.animation = 'none';
  requestAnimationFrame(() => { cdNum.style.animation = 'cdPop 0.55s cubic-bezier(0.34,1.56,0.64,1)'; });
}

async function captureShot(idx) {
  shotOverlay.style.opacity = '1'; shotOverlay.style.transition = 'opacity 0.05s';
  await delay(80);
  shotOverlay.style.transition = 'opacity 0.3s'; shotOverlay.style.opacity = '0';

  if (uploads.length >= 4) { captured[idx] = uploads[idx]; return; }

  const sz = 400;
  const c = document.createElement('canvas'); c.width = sz; c.height = sz;
  const ctx = c.getContext('2d');
  ctx.filter = CSS_FILTER[currentFilter];
  // Mirror front cam capture too
  if (facingMode === 'user') { ctx.translate(sz, 0); ctx.scale(-1, 1); }
  ctx.drawImage(vid, 0, 0, sz, sz);
  ctx.setTransform(1, 0, 0, 1, 0, 0);

  if (currentFilter === 'y2k') {
    ctx.globalCompositeOperation = 'screen'; ctx.globalAlpha = 0.1;
    const g = ctx.createRadialGradient(sz/2, sz/2, 0, sz/2, sz/2, sz/1.4);
    g.addColorStop(0, 'rgba(255,200,230,1)'); g.addColorStop(1, 'rgba(200,170,255,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, sz, sz);
    ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1;
  }
  captured[idx] = c.toDataURL('image/jpeg', 0.93);
}

function retake() {
  captured = []; uploads = [];
  stripOuter.classList.remove('ejected');
  stripStage.classList.remove('ejecting');
  for (let i = 0; i < 4; i++) {
    document.getElementById('cell' + i).innerHTML = '<span class="enum">0' + (i+1) + '</span>';
    document.getElementById('pd' + i).className = 'pd';
  }
  saveRow.style.display = 'none';
  statusTxt.textContent = 'ready';
}

// ── Save ──
async function saveStrip() {
  const imgs = captured.filter(Boolean);
  if (imgs.length < 4) { statusTxt.textContent = 'need 4 shots'; return; }

  // Draw frame image + photos onto canvas
  const frameEl = frameImg;
  const FW = frameEl.naturalWidth;
  const FH = frameEl.naturalHeight;

  outCanvas.width = FW;
  outCanvas.height = FH;
  const ctx = outCanvas.getContext('2d');

  // White base
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, FW, FH);

  // Draw photos at correct positions
  const lx = LEFT_FRAC * FW;
  const pw = FW * (1 - LEFT_FRAC - RIGHT_FRAC);

  const cells = ['cell0', 'cell1', 'cell2', 'cell3'];
  const fracs = [CELL_FRACS.cell0, CELL_FRACS.cell1, CELL_FRACS.cell2, CELL_FRACS.cell3];

  for (let i = 0; i < 4; i++) {
    const f = fracs[i];
    const cy = f.top * FH;
    const ch = (f.bot - f.top) * FH;
    const imgEl = await loadImg(imgs[i]);
    ctx.drawImage(imgEl, lx, cy, pw, ch);
  }

  // Draw frame on top (multiply blend via globalCompositeOperation)
  ctx.globalCompositeOperation = 'multiply';
  ctx.drawImage(frameEl, 0, 0, FW, FH);
  ctx.globalCompositeOperation = 'source-over';

  const a = document.createElement('a');
  a.download = 'coldrain-strip.jpg';
  a.href = outCanvas.toDataURL('image/jpeg', 0.95);
  a.click();
  statusTxt.textContent = 'saved ✓';
}

function loadImg(src) {
  return new Promise((r, j) => {
    const i = new Image(); i.onload = () => r(i); i.onerror = j; i.src = src;
  });
}
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

startCam();
setTimeout(setPhotosLayerGeometry, 500);
</script>

</body>
